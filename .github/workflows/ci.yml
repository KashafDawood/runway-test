name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.17.0'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: Runway-Hemero-BE/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('Runway-Hemero-BE/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./Runway-Hemero-BE
        run: npm ci

      - name: Run linter
        working-directory: ./Runway-Hemero-BE
        run: npm run lint

      - name: Build project
        working-directory: ./Runway-Hemero-BE
        run: npm run build
